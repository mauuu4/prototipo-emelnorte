<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Enviada - EMELNORTE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/primeicons@6.0.1/primeicons.css" rel="stylesheet">
    <style>
        body { background-color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .success-card { background: #fff; padding: 3rem 2rem; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; max-width: 450px; }
        .success-card i { font-size: 4rem; color: #10b981; margin-bottom: 1rem; }
        .success-card h3 { color: #0f172a; font-weight: 700; margin-bottom: 0.5rem; }
        .success-card p { color: #64748b; font-size: 1.05rem; }
    </style>
</head>
<body>
    <div class="success-card">
        <i class="pi pi-check-circle"></i>
        <h3>¡Evaluación Completada!</h3>
        <p>{{ mensaje }}</p>
    </div>
</body>
</html>
